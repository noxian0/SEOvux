appId: com.seovux.desktop
productName: SEOvux
artifactName: "SEOvux-Setup-${version}.${ext}"
publish:
  provider: github
  owner: noxian0
  repo: SEOvux
  releaseType: release
asar: true
asarUnpack:
  - "node_modules/playwright/**"
  - "node_modules/playwright-core/**"
files:
  - "electron/**"
  - "package.json"
extraResources:
  - from: "LICENSE.md"
    to: "legal/LICENSE.md"
  - from: "TERMS.md"
    to: "legal/TERMS.md"
  - from: "electron-resources/node.exe"
    to: "node.exe"
  - from: "electron-resources/app"
    to: "app"
  - from: "electron-resources/runtime_modules"
    to: "app/node_modules"
  - from: "electron-resources/browsers"
    to: "browsers"
win:
  target: nsis
  icon: assets/seovux.ico
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: SEOvux
